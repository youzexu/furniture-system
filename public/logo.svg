<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="450" height="120">
  <defs>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="30%" stop-color="#8b6914"/>
      <stop offset="50%" stop-color="#d4b86a"/>
      <stop offset="70%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#6b4f10"/>
    </linearGradient>
    <linearGradient id="woodH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="40%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>

  <!-- Transparent background -->
  <rect width="450" height="120" fill="transparent"/>

  <!-- Icon: scaled for horizontal layout -->
  <g transform="translate(42, 18) scale(0.62)">
    <!-- Diamond frame -->
    <polygon points="70,0 145,55 70,115 0,55"
             fill="none" stroke="url(#woodH)" stroke-width="2.8"
             stroke-linejoin="round"/>
    <!-- Inner hairline -->
    <polygon points="70,8 137,55 70,107 3,55"
             fill="none" stroke="#1a1a1a" stroke-width="0.5"
             stroke-linejoin="round" opacity="0.25"/>
    <!-- Ripples -->
    <path d="M70,24 Q100,55 70,91"
          fill="none" stroke="url(#goldH)" stroke-width="2"
          stroke-linecap="round"/>
    <path d="M70,36 Q88,55 70,77"
          fill="none" stroke="url(#goldH)" stroke-width="1.4"
          stroke-linecap="round"/>
    <!-- Center -->
    <circle cx="70" cy="55" r="4.5" fill="url(#goldH)"/>
    <circle cx="70" cy="55" r="7" fill="none" stroke="url(#goldH)" stroke-width="0.6" opacity="0.5"/>
    <!-- Top accent -->
    <line x1="70" y1="3" x2="70" y2="14" stroke="url(#goldH)" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="64" y1="8" x2="76" y2="8" stroke="url(#goldH)" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Bottom accent -->
    <line x1="70" y1="105" x2="70" y2="112" stroke="url(#goldH)" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Vertical divider -->
  <line x1="120" y1="30" x2="120" y2="90" stroke="url(#goldH)" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Brand text -->
  <text x="140" y="56" text-anchor="start"
        font-family="'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif"
        font-size="32" font-weight="600" letter-spacing="10"
        fill="#1a1a1a">尚品工坊</text>

  <!-- Tagline -->
  <text x="140" y="80" text-anchor="start"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="9.5" font-weight="300" letter-spacing="8"
        fill="#999">源头工厂 · 高端定制</text>

  <!-- Gold underline -->
  <line x1="140" y1="92" x2="340" y2="92" stroke="url(#goldH)" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
</svg>
