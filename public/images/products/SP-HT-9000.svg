<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c9a84c"/><stop offset="50%" stop-color="#d4b86a"/><stop offset="100%" stop-color="#8b6914"/></linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="0.5" fill="#8b6914" opacity="0.06"/></pattern>
  </defs>
  <rect width="800" height="600" fill="#fafaf8"/><rect width="800" height="600" fill="url(#dots)"/>
  <!-- Hotel building + bed -->
  <g transform="translate(400,215)" stroke="url(#gold)" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.35">
    <!-- Building outline -->
    <path d="M-80,-80 L-80,70 L80,70 L80,-80 Z"/>
    <path d="M-80,-80 L0,-110 L80,-80"/>
    <!-- Windows -->
    <rect x="-60" y="-60" width="25" height="20" rx="1"/><rect x="35" y="-60" width="25" height="20" rx="1"/>
    <rect x="-60" y="-25" width="25" height="20" rx="1"/><rect x="35" y="-25" width="25" height="20" rx="1"/>
    <rect x="-60" y="10" width="25" height="20" rx="1"/><rect x="35" y="10" width="25" height="20" rx="1"/>
    <!-- Door -->
    <rect x="-20" y="30" width="40" height="40" rx="2"/>
    <!-- Bed inside bottom -->
    <rect x="-120" y="45" width="40" height="25" rx="2"/>
    <rect x="80" y="45" width="40" height="25" rx="2"/>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="'Noto Serif SC','STSong','SimSun',serif" font-size="32" font-weight="500" letter-spacing="6" fill="#1a1a1a">酒店客房整装方案</text>
  <text x="400" y="415" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="5" fill="#999">SP-HT-9000</text>
  <line x1="340" y1="435" x2="460" y2="435" stroke="url(#gold)" stroke-width="1" stroke-linecap="round"/>
</svg>
