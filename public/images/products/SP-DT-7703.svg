<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c9a84c"/><stop offset="50%" stop-color="#d4b86a"/><stop offset="100%" stop-color="#8b6914"/></linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="0.5" fill="#8b6914" opacity="0.06"/></pattern>
  </defs>
  <rect width="800" height="600" fill="#fafaf8"/><rect width="800" height="600" fill="url(#dots)"/>
  <!-- Dining table -->
  <g transform="translate(400,220)" stroke="url(#gold)" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.35">
    <ellipse cx="0" cy="0" rx="140" ry="25"/>
    <line x1="-140" y1="25" x2="-140" y2="80"/><line x1="140" y1="25" x2="140" y2="80"/>
    <line x1="-80" y1="25" x2="-80" y2="80"/><line x1="80" y1="25" x2="80" y2="80"/>
    <rect x="-150" y="78" width="300" height="3" rx="1"/>
    <!-- Chairs (6 small) -->
    <rect x="-30" y="-50" width="25" height="30" rx="3"/>
    <rect x="5" y="-50" width="25" height="30" rx="3"/>
    <rect x="-100" y="-40" width="20" height="25" rx="3"/>
    <rect x="80" y="-40" width="20" height="25" rx="3"/>
    <rect x="-120" y="-20" width="20" height="25" rx="3"/>
    <rect x="100" y="-20" width="20" height="25" rx="3"/>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="'Noto Serif SC','STSong','SimSun',serif" font-size="32" font-weight="500" letter-spacing="6" fill="#1a1a1a">意式岩板伸缩餐桌</text>
  <text x="400" y="415" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="5" fill="#999">SP-DT-7703</text>
  <line x1="340" y1="435" x2="460" y2="435" stroke="url(#gold)" stroke-width="1" stroke-linecap="round"/>
