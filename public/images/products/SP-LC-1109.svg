<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/><stop offset="50%" stop-color="#d4b86a"/><stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="0.5" fill="#8b6914" opacity="0.06"/></pattern>
  </defs>
  <rect width="800" height="600" fill="#fafaf8"/>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- Lounge chair abstract -->
  <g transform="translate(400,230)" stroke="url(#gold)" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.35">
    <path d="M-60,40 L-60,-40 Q-60,-70 0,-70 Q60,-70 60,-40 L60,40"/>
    <path d="M-60,40 L-80,60 L-80,90 L60,90 L60,60 L60,40"/>
    <line x1="-80" y1="90" x2="-80" y2="110"/>
    <line x1="60" y1="90" x2="60" y2="110"/>
    <!-- Seat -->
    <path d="M-60,10 Q0,20 60,10"/>
    <!-- Backrest curve -->
    <path d="M-50,-50 Q0,-80 50,-50" stroke-width="1.2"/>
  </g>

  <text x="400" y="380" text-anchor="middle" font-family="'Noto Serif SC','STSong','SimSun',serif" font-size="32" font-weight="500" letter-spacing="6" fill="#1a1a1a">意式极简单人休闲椅</text>
  <text x="400" y="415" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="5" fill="#999">SP-LC-1109</text>
  <line x1="340" y1="435" x2="460" y2="435" stroke="url(#gold)" stroke-width="1" stroke-linecap="round"/>
</svg>
