<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c9a84c"/><stop offset="50%" stop-color="#d4b86a"/><stop offset="100%" stop-color="#8b6914"/></linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="0.5" fill="#8b6914" opacity="0.06"/></pattern>
  </defs>
  <rect width="800" height="600" fill="#fafaf8"/><rect width="800" height="600" fill="url(#dots)"/>
  <!-- Standing desk -->
  <g transform="translate(400,215)" stroke="url(#gold)" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.35">
    <!-- Desktop -->
    <rect x="-150" y="-20" width="300" height="18" rx="2"/>
    <!-- Lifting columns -->
    <rect x="-130" y="-2" width="16" height="60" rx="2"/><rect x="114" y="-2" width="16" height="60" rx="2"/>
    <!-- Motor housing -->
    <rect x="-120" y="50" width="240" height="12" rx="2"/>
    <!-- Base feet -->
    <rect x="-160" y="62" width="320" height="5" rx="2"/>
    <!-- Monitor on desk -->
    <rect x="-20" y="-55" width="50" height="35" rx="2"/>
    <line x1="5" y1="-20" x2="5" y2="-10"/>
    <rect x="-30" y="-10" width="70" height="3" rx="1"/>
    <!-- Keyboard -->
    <rect x="-40" y="-5" width="50" height="5" rx="1"/>
    <!-- Up/down arrows -->
    <path d="M100,-15 L105,-25 L110,-15 M100,-8 L105,2 L110,-8" stroke-width="1.2"/>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="'Noto Serif SC','STSong','SimSun',serif" font-size="32" font-weight="500" letter-spacing="6" fill="#1a1a1a">智能升降办公桌</text>
  <text x="400" y="415" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="5" fill="#999">SP-OD-1500</text>
  <line x1="340" y1="435" x2="460" y2="435" stroke="url(#gold)" stroke-width="1" stroke-linecap="round"/>
</svg>
