<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c9a84c"/><stop offset="50%" stop-color="#d4b86a"/><stop offset="100%" stop-color="#8b6914"/></linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="0.5" fill="#8b6914" opacity="0.06"/></pattern>
  </defs>
  <rect width="800" height="600" fill="#fafaf8"/><rect width="800" height="600" fill="url(#dots)"/>
  <!-- Dining chair set -->
  <g transform="translate(400,230)" stroke="url(#gold)" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.35">
    <!-- Main chair -->
    <path d="M-30,30 L-30,-40 Q-30,-65 -10,-70 L10,-70 Q30,-65 30,-40 L30,30"/>
    <path d="M-30,30 L-35,55 L-35,85 L35,85 L35,55 L30,30"/>
    <line x1="-35" y1="85" x2="-35" y2="105"/><line x1="35" y1="85" x2="35" y2="105"/>
    <rect x="-40" y="103" width="80" height="2" rx="1"/>
    <!-- Second chair offset -->
    <g transform="translate(80,10) scale(0.85)">
      <path d="M-30,30 L-30,-40 Q-30,-65 -10,-70 L10,-70 Q30,-65 30,-40 L30,30"/>
      <path d="M-30,30 L-35,55 L-35,85 L35,85 L35,55 L30,30"/>
      <line x1="-35" y1="85" x2="-35" y2="105"/><line x1="35" y1="85" x2="35" y2="105"/>
    </g>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="'Noto Serif SC','STSong','SimSun',serif" font-size="30" font-weight="500" letter-spacing="6" fill="#1a1a1a">轻奢皮质餐椅（6把装）</text>
  <text x="400" y="415" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="5" fill="#999">SP-DC-4408S</text>
  <line x1="340" y1="435" x2="460" y2="435" stroke="url(#gold)" stroke-width="1" stroke-linecap="round"/>
