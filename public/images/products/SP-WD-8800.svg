<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c9a84c"/><stop offset="50%" stop-color="#d4b86a"/><stop offset="100%" stop-color="#8b6914"/></linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="0.5" fill="#8b6914" opacity="0.06"/></pattern>
  </defs>
  <rect width="800" height="600" fill="#fafaf8"/><rect width="800" height="600" fill="url(#dots)"/>
  <!-- Wardrobe system -->
  <g transform="translate(400,210)" stroke="url(#gold)" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.35">
    <rect x="-140" y="-90" width="280" height="150" rx="2"/>
    <line x1="-70" y1="-90" x2="-70" y2="60"/><line x1="0" y1="-90" x2="0" y2="60"/><line x1="70" y1="-90" x2="70" y2="60"/>
    <line x1="-140" y1="0" x2="140" y2="0"/>
    <!-- Hanging rods -->
    <line x1="-120" y1="-70" x2="-20" y2="-70"/><line x1="20" y1="-70" x2="120" y2="-70"/>
    <!-- Hangers -->
    <path d="M-100,-70 L-100,-40 M-100,-40 L-110,-40 M-100,-40 L-90,-40" stroke-width="1.2"/>
    <path d="M-50,-70 L-50,-40 M-50,-40 L-60,-40 M-50,-40 L-40,-40" stroke-width="1.2"/>
    <path d="M50,-70 L50,-40 M50,-40 L40,-40 M50,-40 L60,-40" stroke-width="1.2"/>
    <!-- Drawers bottom -->
    <line x1="-105" y1="20" x2="-35" y2="20"/><line x1="35" y1="20" x2="105" y2="20"/>
    <line x1="-105" y1="40" x2="-35" y2="40"/><line x1="35" y1="40" x2="105" y2="40"/>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="'Noto Serif SC','STSong','SimSun',serif" font-size="30" font-weight="500" letter-spacing="6" fill="#1a1a1a">步入式衣帽间系统</text>
  <text x="400" y="415" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="5" fill="#999">SP-WD-8800</text>
  <line x1="340" y1="435" x2="460" y2="435" stroke="url(#gold)" stroke-width="1" stroke-linecap="round"/>
</svg>
