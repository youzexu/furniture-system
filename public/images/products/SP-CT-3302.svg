<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/><stop offset="50%" stop-color="#d4b86a"/><stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="0.5" fill="#8b6914" opacity="0.06"/></pattern>
  </defs>
  <rect width="800" height="600" fill="#fafaf8"/>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- Coffee table abstract -->
  <g transform="translate(400,230)" stroke="url(#gold)" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.35">
    <rect x="-140" y="-15" width="280" height="15" rx="2"/>
    <line x1="-140" y1="0" x2="-140" y2="40"/>
    <line x1="140" y1="0" x2="140" y2="40"/>
    <line x1="-120" y1="-15" x2="-120" y2="40"/>
    <line x1="120" y1="-15" x2="120" y2="40"/>
    <rect x="-150" y="38" width="300" height="4" rx="1"/>
    <!-- Lower shelf -->
    <rect x="-100" y="55" width="200" height="8" rx="1"/>
    <line x1="-100" y1="59" x2="-100" y2="80"/>
    <line x1="100" y1="59" x2="100" y2="80"/>
    <rect x="-110" y="78" width="220" height="3" rx="1"/>
  </g>

  <text x="400" y="380" text-anchor="middle" font-family="'Noto Serif SC','STSong','SimSun',serif" font-size="32" font-weight="500" letter-spacing="6" fill="#1a1a1a">轻奢岩板组合茶几</text>
  <text x="400" y="415" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="5" fill="#999">SP-CT-3302</text>
  <line x1="340" y1="435" x2="460" y2="435" stroke="url(#gold)" stroke-width="1" stroke-linecap="round"/>
</svg>
