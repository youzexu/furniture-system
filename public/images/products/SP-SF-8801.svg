<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#d4b86a"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.5" fill="#8b6914" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#fafaf8"/>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- Sofa abstract line art -->
  <g transform="translate(400,230)" stroke="url(#gold)" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.35">
    <path d="M-120,40 Q-140,40 -140,20 L-140,-30 Q-140,-60 -100,-60 L100,-60 Q140,-60 140,-30 L140,20 Q140,40 120,40"/>
    <path d="M-120,40 L-120,70 Q-120,90 -90,90 L90,90 Q120,90 120,70 L120,40"/>
    <line x1="-100" y1="90" x2="-100" y2="110"/>
    <line x1="100" y1="90" x2="100" y2="110"/>
    <path d="M-80,-60 L-80,20"/>
    <path d="M80,-60 L80,20"/>
    <!-- Armrests -->
    <path d="M-140,20 Q-160,20 -160,40 L-160,70 Q-160,90 -140,90"/>
    <path d="M140,20 Q160,20 160,40 L160,70 Q160,90 140,90"/>
  </g>

  <!-- Product name -->
  <text x="400" y="380" text-anchor="middle" font-family="'Noto Serif SC','STSong','SimSun',serif" font-size="32" font-weight="500" letter-spacing="6" fill="#1a1a1a">意式极简真皮沙发</text>
  <!-- Code -->
  <text x="400" y="415" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" letter-spacing="5" fill="#999">SP-SF-8801</text>
  <!-- Gold line -->
  <line x1="340" y1="435" x2="460" y2="435" stroke="url(#gold)" stroke-width="1" stroke-linecap="round"/>
</svg>
