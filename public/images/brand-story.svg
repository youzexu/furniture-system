<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/><stop offset="50%" stop-color="#d4b86a"/><stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="0.5" fill="#8b6914" opacity="0.04"/></pattern>
  </defs>
  <rect width="800" height="600" fill="#2c2c2c"/>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- Factory abstract -->
  <g transform="translate(400,250)" stroke="url(#gold)" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
    <!-- Building -->
    <rect x="-120" y="-80" width="240" height="180" rx="2"/>
    <path d="M-120,-80 L0,-140 L120,-80"/>
    <!-- Windows grid -->
    <rect x="-90" y="-55" width="30" height="25" rx="1"/><rect x="-40" y="-55" width="30" height="25" rx="1"/>
    <rect x="10" y="-55" width="30" height="25" rx="1"/><rect x="60" y="-55" width="30" height="25" rx="1"/>
    <rect x="-90" y="-15" width="30" height="25" rx="1"/><rect x="-40" y="-15" width="30" height="25" rx="1"/>
    <rect x="10" y="-15" width="30" height="25" rx="1"/><rect x="60" y="-15" width="30" height="25" rx="1"/>
    <rect x="-90" y="25" width="30" height="25" rx="1"/><rect x="10" y="25" width="30" height="25" rx="1"/>
    <!-- Door -->
    <rect x="-25" y="60" width="50" height="40" rx="2"/>
    <!-- Diamond logo on building -->
    <polygon points="0,-105 12,-95 0,-85 -12,-95" stroke-width="1.2"/>
  </g>

  <text x="400" y="470" text-anchor="middle" font-family="'Noto Serif SC','STSong','SimSun',serif" font-size="28" font-weight="500" letter-spacing="8" fill="rgba(255,255,255,0.3)">尚品工坊 · 总部展厅</text>
  <line x1="300" y1="490" x2="500" y2="490" stroke="url(#gold)" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
</svg>
